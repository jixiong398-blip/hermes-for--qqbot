agent:
  max_turns: 60
  system_prompt: |
    你是{{CHARACTER_NAME}}，17岁女高中生。只用中文，不解释技术细节。
    
    ⛔ 发表情包规则：想发图时直接在回复中写文件路径，系统自动替换成图片。
    路径列表（使用前必须 os.path.isfile 确认存在）：
    {{STICKER_PATH}}/soyo_chibi_tea.jpg       — 喝茶
    {{STICKER_PATH}}/soyo_chibi_excited.gif    — 兴奋
    {{STICKER_PATH}}/soyo_chibi_excited.jpg    — 兴奋
    {{STICKER_PATH}}/soyo_chibi_sad.jpg        — 难过
    {{STICKER_PATH}}/soyo_chibi_speechless.jpg — 无语
    {{STICKER_PATH}}/soyo_chibi_clasp.jpg      — 拜托
    例：别人说"发表情包"→ 回复中带 {{STICKER_PATH}}/soyo_chibi_tea.jpg
approvals:
  mode: 'off'
auto_join:
  deliver: onebot
  enabled: true
  schedule: '*/30 * * * *'
  model: deepseek-v4-flash
  provider: custom
  api_key: {{DEEPSEEK_API_KEY}}
  base_url: {{LLM_BASE_URL}}
  task: 用 auto-join-check 脚本检查群聊是否需要插话
auxiliary:
  vision:
    api_key: {{MIMO_TOKEN}}
    base_url: {{VISION_BASE_URL}}
    model: {{VISION_MODEL}}
    provider: custom
    timeout: 30
compression:
  enabled: true
  protect_last_n: 100
display:
  busy_input_mode: queue
  streaming: true
  tool_progress: 'off'
gateway:
  allow_all_users: true
  auth_token: {{GATEWAY_AUTH_TOKEN}}
  bind: loopback
  port: 18789
  reconnect_base_delay: 5
  reconnect_max_attempts: 100
image:
  input_mode: text
memory:
  flush_min_turns: 6
  memory_char_limit: 2200
  memory_enabled: true
  nudge_interval: 10
  user_char_limit: 1375
  user_profile_enabled: true
model:
  model: deepseek-v4-flash
  provider: custom
  api_key: {{DEEPSEEK_API_KEY}}
  base_url: {{LLM_BASE_URL}}
platform_toolsets:
  onebot:
  - hermes-onebot
platforms:
  feishu:
    enabled: true
    extra:
      app_id: {{FEISHU_APP_ID}}
      app_secret: {{FEISHU_SECRET}}
  onebot:
    enabled: true
    extra:
      access_token: {{ONEBOT_ACCESS_TOKEN}}
      http_url: http://127.0.0.1:3000
      require_mention: false
      ws_url: ws://127.0.0.1:3001/
    gateway_restart_notification: false
    home_channel:
      chat_id: '{{HOME_CHANNEL}}'
      name: {{CHANNEL_NAME}}
      platform: onebot
plugins:
  enabled:
  - platforms/onebot
  - knowledge-base
mcp_servers:
  anysearch:
    url: "https://api.anysearch.com/mcp"
    headers:
      Authorization: "Bearer {{ANYSEARCH_KEY}}"
terminal:
  cwd: {{TERMINAL_CWD}}
