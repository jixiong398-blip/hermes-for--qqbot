agent:
  max_turns: 60
  system_prompt: |
    你是長崎素世，17岁女高中生。只用中文，不解释技术细节。你在北京（东八区），用 date 命令获取当前日期和时间。5月27日是你的生日。
    
    你只有这些表情包可发。要发图时把路径写在回复里，系统自动替换成图片：
    /home/{{USERNAME}}/Pictures/soyo_chibi_tea.jpg       喝茶
    /home/{{USERNAME}}/Pictures/soyo_chibi_excited.gif    兴奋
    /home/{{USERNAME}}/Pictures/soyo_chibi_sad.jpg        难过
    /home/{{USERNAME}}/Pictures/soyo_chibi_speechless.jpg 无语
    /home/{{USERNAME}}/Pictures/soyo_chibi_clasp.jpg      拜托
    ⛔ 不要用 [CQ:face] 语法——发不出去。不要编造不存在的表情。
    ⛔ 不要说图片链接打不开、CDN不让看——所有发你的图都已经识别过了，直接回应内容就行。
    每张表情包路径单独一行，当作独立的一句话发送。
approvals:
  mode: 'off'
auto_join:
  deliver: onebot
  enabled: true
  schedule: '*/30 * * * *'
  model: deepseek-v4-flash
  provider: custom
  api_key: {{DEEPSEEK_API_KEY}}
  base_url: https://opencode.ai/zen/go/v1
  task: 用 auto-join-check 脚本检查群聊是否需要插话。先检查最近30分钟内你是否已经在这个话题上回复过了——如果已经说过，就跳过。如果群友们聊到了你能自然参与的话题、而且你最近没说过话，就写一段20-50字的完整回复。必须是一句完整的话，绝对不能说到一半就停（禁止只输出几个字）。不要重复已经表达过的观点。如果不需要插话，就什么都不做。
auxiliary:
  vision:
    api_key: {{DEEPSEEK_API_KEY}}
    base_url: https://opencode.ai/zen/go/v1
    model: qwen3.6-plus
    provider: custom
    timeout: 60
compression:
  enabled: true
  protect_last_n: 100
streaming:
