<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQBot Dashboard</title>
<style>
/* ============================================================
   Styles — preserved from original
   ============================================================ */
:root{--bg:#f5f5f7;--text:#1d1d1f;--text2:#86868b;--text3:#aeaeb2;--accent:#007aff;--danger:#ff3b30;--success:#34c759;--warning:#ff9500;--card-bg:rgba(255,255,255,0.72);--card-border:rgba(0,0,0,0.04);--section-bg:rgba(0,0,0,0.03);--radius:20px;--radius-sm:12px;--radius-xs:8px;--shadow-card:0 2px 12px rgba(0,0,0,0.04);--ease:cubic-bezier(0.23,1,0.32,1);--spring:cubic-bezier(0.34,1.56,0.64,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.app{max-width:1440px;margin:0 auto;padding:0 32px 48px}
.header{display:flex;justify-content:space-between;align-items:flex-end;padding:32px 0 24px}
.header-left h1{font-size:34px;font-weight:700;color:var(--text);letter-spacing:-0.03em;line-height:1.1}
.header-left .sub{font-size:15px;color:var(--text2);font-weight:500;margin-top:4px}
.main-layout{display:flex;gap:0;height:calc(100vh - 140px)}
.pane-left{overflow-y:auto;padding-right:12px;padding-left:16px;min-width:380px}
.pane-right{overflow:hidden;padding-left:12px;flex:1;min-width:300px;display:flex;flex-direction:column}
.divider{width:6px;cursor:col-resize;background:transparent;position:relative;z-index:10;flex-shrink:0}
.divider:hover,.divider.dragging{background:var(--accent);opacity:0.3}
.card{background:var(--card-bg);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow-card)}
.card-wide{grid-column:1/-1}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.card-header .card-icon{font-size:24px;line-height:1}
.card-header h2{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-0.02em}
/* service hero */
.hero-card{background:linear-gradient(160deg,rgba(255,255,255,0.88),rgba(240,246,255,0.82));backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(0,0,0,0.05);border-radius:var(--radius);padding:32px;margin-bottom:24px;box-shadow:var(--shadow-card)}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.hero-heading h2{font-size:20px;font-weight:700;letter-spacing:-0.02em;color:var(--text);display:flex;align-items:center;gap:10px}
.hero-subtitle{font-size:13px;color:var(--text2);font-weight:500;margin-top:4px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-hero{padding:14px 24px;font-size:15px;font-weight:600;border-radius:14px;border:none;cursor:pointer;font-family:inherit;transition:all var(--ease);white-space:nowrap;display:inline-flex;align-items:center;gap:8px}
.btn-hero-start{background:linear-gradient(135deg,#007AFF,#5856D6);color:#fff;box-shadow:0 2px 8px rgba(0,122,255,0.35)}
.btn-hero-start:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,122,255,0.5)}
.btn-hero-stop{background:linear-gradient(135deg,#FF3B30,#FF6B35);color:#fff;box-shadow:0 2px 8px rgba(255,59,48,0.3)}
.btn-hero-stop:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,59,48,0.45)}
/* service rows */
.service-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.service-row:last-child{border-bottom:none}
.service-left{display:flex;align-items:center;gap:12px}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-dot.running{background:var(--success);box-shadow:0 0 8px rgba(52,199,89,0.4)}
.status-dot.starting{background:var(--warning);animation:pulse 1s infinite}
.status-dot.stopped{background:var(--text3)}
.status-dot.unavailable{background:var(--danger);opacity:0.5}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.service-info{display:flex;flex-direction:column}
.service-name{font-size:14px;font-weight:600;color:var(--text)}
.service-port{font-size:11px;color:var(--text3);font-family:"SF Mono","Consolas",monospace}
.service-actions{display:flex;gap:8px}
.btn-service{padding:6px 14px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all var(--ease)}
.btn-service-start{background:var(--success);color:#fff}
.btn-service-stop{background:var(--danger);color:#fff}
.btn-service-restart{background:var(--warning);color:#fff}
.btn-service:disabled{opacity:0.5;cursor:default}
/* status cards */
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.03)}
.stat-row:last-child{border-bottom:none}
.stat-row .key{font-size:13px;color:var(--text2);font-weight:500}
.stat-row .val{font-size:15px;font-weight:600;color:var(--text)}
/* log */
.pane-right .log-section{margin-bottom:0;flex:1;display:flex;flex-direction:column;overflow:hidden}
.log-card{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.log-card-header{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid rgba(0,0,0,0.06)}
.log-area{flex:1;overflow-y:auto;padding:8px 16px;font-family:"SF Mono","Cascadia Code","Consolas",monospace;font-size:11px;line-height:1.3;background:rgba(0,0,0,0.03);border-radius:8px;margin:0 12px 12px}
.log-line{padding:0;border-bottom:1px solid rgba(255,255,255,0.02);white-space:pre-wrap;word-break:break-all}
.log-line .svc-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-right:6px;vertical-align:middle}
.log-line .ts{color:#636366;margin-right:8px;font-size:10px}
.log-empty{padding:40px;text-align:center;color:var(--text2)}
/* search */
.search-box{display:flex;border:1px solid var(--card-border);border-radius:var(--radius-sm);overflow:hidden}
.search-box input{flex:1;border:none;padding:12px 16px;font-size:14px;outline:none;background:var(--card-bg)}
.search-icon{padding:12px 0 12px 14px;color:var(--text2)}
.search-results{margin-top:12px;max-height:300px;overflow-y:auto}
.search-result{padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.search-result:last-child{border-bottom:none}
.search-result .title{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:4px}
.search-result .snippet{font-size:12px;color:var(--text2);line-height:1.5}
/* buttons */
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all var(--ease)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{opacity:0.9}
.badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
.badge.active{background:rgba(52,199,89,0.12);color:var(--success)}
.badge.forgotten{background:rgba(255,59,48,0.1);color:var(--danger)}
/* voice */
.voice-toggle-row{display:flex;gap:10px;margin-bottom:12px}
.btn-voice{flex:1;padding:12px;border:2px solid var(--card-border);border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:all var(--ease);background:transparent}
.btn-voice:hover{border-color:var(--accent)}
.btn-voice-on.active{background:rgba(0,122,255,0.1);border-color:var(--accent);color:var(--accent)}
.voice-chat-row{display:flex;gap:8px;align-items:center}
.voice-chat-row input{flex:1;padding:10px 14px;border:1px solid var(--card-border);border-radius:var(--radius-xs);font-size:14px;outline:none}
/* toast */
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border:1px solid rgba(0,0,0,0.08);border-radius:var(--radius-sm);padding:14px 22px;box-shadow:0 4px 20px rgba(0,0,0,0.1);animation:toastIn 0.4s var(--spring);font-size:14px;font-weight:500;color:var(--text);pointer-events:auto}
.toast.out{animation:toastOut 0.25s ease-in forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-16px) scale(0.95)}}
/* misc */
.spinner{width:20px;height:20px;border:2.5px solid rgba(0,0,0,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
.spinner-sm{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{font-size:13px;color:var(--text2);padding:14px 0}
input,select{font-family:inherit;font-size:15px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:3px}
.log-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1)}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-left">
    <h1>QQBot Dashboard</h1>
    <div class="sub" id="gwHeroStatus">等待连接…</div>
  </div>
</div>

<div class="hero-card">
  <div class="hero-top">
    <div class="hero-heading">
      <h2>⚡ 服务控制</h2>
      <div class="hero-subtitle">管理 NapCat / Gateway / Live2D / TTS 服务</div>
    </div>
    <div class="hero-actions">
      <button class="btn-hero btn-hero-start" onclick="startAll()">🚀 一键启动全部</button>
      <button class="btn-hero btn-hero-stop" onclick="stopAll()">⏹️ 一键停止全部</button>
    </div>
  </div>
  <div id="serviceList"></div>
</div>

<div class="main-layout">
  <div class="pane-left">
    <!-- voice mode -->
    <article class="card">
      <div class="card-header"><span class="card-icon">🎤</span><h2>语音模式</h2><span class="badge" id="voiceModeLabel" style="margin-left:auto;background:var(--section-bg);color:var(--text2);font-size:13px">—</span></div>
      <div class="voice-toggle-row">
        <button class="btn-voice btn-voice-on active" onclick="setVoice('pure_voice')">🎙️ 纯语音</button>
        <button class="btn-voice" onclick="setVoice('off')">💬 纯文字</button>
      </div>
      <div class="voice-chat-row">
        <input type="text" placeholder="Chat ID" id="voiceChatId" value="{{HOME_CHANNEL}}">
        <button class="btn btn-accent" onclick="applyVoice()">应用</button>
      </div>
      <div style="margin-top:16px" id="voiceList"></div>
    </article>

    <!-- knowledge base -->
    <article class="card">
      <div class="card-header"><span class="card-icon">🔍</span><h2>知识库</h2></div>
      <div class="stat-row"><span class="key">笔记总数</span><span class="val" id="obsNotes">-</span></div>
      <div class="stat-row"><span class="key">链接</span><span class="val" id="obsLinks">-</span></div>
      <div class="stat-row"><span class="key">标签</span><span class="val" id="obsTags">-</span></div>
      <div class="search-box" style="margin-top:16px">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="搜索知识库…" id="obsSearch" onkeydown="if(event.key==='Enter')searchObsidian()">
        <button class="btn btn-accent" onclick="searchObsidian()" style="padding:12px 18px;border-radius:0 var(--radius-sm) var(--radius-sm) 0">搜索</button>
      </div>
      <div class="search-results" id="obsResults"></div>
    </article>

    <!-- memory search -->
    <article class="card">
      <div class="card-header"><span class="card-icon">📝</span><h2>记忆检索</h2></div>
      <div id="memoryStats" style="margin-bottom:12px"></div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="搜索全部记忆…" id="memSearch" onkeydown="if(event.key==='Enter')searchMemory()">
        <button class="btn btn-accent" onclick="searchMemory()" style="padding:12px 18px;border-radius:0 var(--radius-sm) var(--radius-sm) 0">搜索</button>
      </div>
      <div class="search-results" id="memResults"></div>
      <button class="btn btn-accent" style="margin-top:16px;width:100%" onclick="runMaintenance()">运行维护</button>
    </article>

    <!-- memory health -->
    <article class="card">
      <div class="card-header"><span class="card-icon">📊</span><h2>记忆健康</h2></div>
      <div id="memoryHealth"></div>
    </article>

    <!-- Live2D -->
    <article class="card">
      <div class="card-header"><span class="card-icon">🎭</span><h2>Live2D 立绘</h2></div>
      <div class="stat-row"><span class="key">角色</span><span class="val"><select id="l2dChar" onchange="l2dLoadOutfits()"><option value="">—</option></select></span></div>
      <div class="stat-row"><span class="key">服装</span><span class="val"><select id="l2dOutfit"><option value="">—</option></select></span></div>
      <button class="btn btn-accent" style="margin-top:12px;width:100%" onclick="l2dSwitch()">切换</button>
      <div style="margin-top:8px;font-size:12px;color:var(--text2)" id="l2dSwitchStatus"></div>
    </article>
  </div>

  <!-- log panel -->
  <div class="divider" id="divider"></div>
  <div class="pane-right">
    <div class="log-section" style="margin-bottom:0;flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="log-card card" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden">
        <div class="log-card-header">
          <span class="card-icon">📋</span><h2>服务日志</h2>
          <button class="btn btn-accent" onclick="connectLogStream()" style="padding:4px 12px;font-size:12px;margin-left:8px">🔄 重连</button>
          <button class="btn btn-accent" onclick="logLines=[];renderLog()" style="padding:4px 12px;font-size:12px">清空</button>
        </div>
        <div class="log-area" id="logArea"><div class="log-empty">等待日志输出…</div></div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
// ============================================================
// API helper
// ============================================================
var API = "";
function $(id) { return document.getElementById(id); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function api(path, method, body) {
  var opts = { method: method || "GET", headers: {} };
  if (body) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  var r = await fetch(API + path, opts);
  if (!r.ok) throw new Error(r.status + " " + r.statusText);
  return r.json();
}

// ============================================================
// Toast
// ============================================================
var _toastId = 0;
function toast(msg, type) {
  var el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  var container = document.querySelector(".toast-container") || (function(){
    var c = document.createElement("div"); c.className = "toast-container"; document.body.appendChild(c); return c;
  })();
  container.appendChild(el);
  setTimeout(function(){ el.classList.add("out"); setTimeout(function(){ el.remove(); }, 300); }, 3000);
}

// ============================================================
// Service management
// ============================================================
var SERVICE_IDS = ["napcat","hermes_gateway","live2d","gptsovits","tts_adapter"];
var SERVICE_NAMES = {napcat:"NapCat",hermes_gateway:"Gateway",live2d:"Live2D",gptsovits:"GPT-SoVITS",tts_adapter:"TTS"};
var SERVICE_COLORS = {napcat:"#34C759",hermes_gateway:"#007AFF",live2d:"#AF52DE",gptsovits:"#FF9500",tts_adapter:"#FF6B35"};

function serviceStatus(name, running, available) {
  var cls;
  if (!available) cls = "unavailable";
  else if (running) cls = "running";
  else cls = "stopped";
  var label = !available ? "未安装" : (running ? "运行中" : "已停止");
  return {cls:cls, label:label};
}

async function refreshServices() {
  try {
    var r = await api("/api/services/status");
    var svc = r.services || {};
    var h = "";
    SERVICE_IDS.forEach(function(id) {
      var s = svc[id] || {};
      var st = serviceStatus(id, s.running, s.available !== false);
      h += '<div class="service-row">';
      h += '<div class="service-left"><span class="status-dot '+st.cls+'"></span>';
      h += '<div class="service-info"><span class="service-name">'+SERVICE_NAMES[id]+'</span>';
      h += '<span class="service-port"> 端口 '+s.port+'</span></div></div>';
      h += '<div class="service-actions">';
      if (st.cls === "running") {
        h += '<button class="btn-service btn-service-restart" onclick="svcAction(\''+id+'\',\'restart\')">重启</button>';
        h += '<button class="btn-service btn-service-stop" onclick="svcAction(\''+id+'\',\'stop\')">停止</button>';
      } else if (st.cls === "stopped") {
        h += '<button class="btn-service btn-service-start" onclick="svcAction(\''+id+'\',\'start\')">启动</button>';
      } else {
        h += '<span style="font-size:11px;color:var(--text3)" title="此服务需额外安装。Live2D 需 npm install，GPT-SoVITS 需自行部署。">需自行安装</span>';
      }
      h += '</div></div>';
    });
    $("serviceList").innerHTML = h;
  } catch(e) {
    $("serviceList").innerHTML = '<div class="empty-state">无法获取服务状态</div>';
  }
}

async function svcAction(id, action) {
  try {
    await api("/api/services/" + action, "POST", {service: id});
    toast(SERVICE_NAMES[id] + " " + (action==="start"?"启动中":"停止中"));
    setTimeout(refreshServices, 2000);
  } catch(e) {
    toast("操作失败: " + e.message);
  }
}

async function startAll() {
  try {
    await api("/api/services/start-all", "POST");
    toast("全部服务启动指令已发送");
    setTimeout(refreshServices, 3000);
    connectLogStream();
  } catch(e) { toast("启动失败"); }
}

async function stopAll() {
  try {
    await api("/api/services/stop-all", "POST");
    toast("全部服务停止指令已发送");
    setTimeout(refreshServices, 2000);
  } catch(e) { toast("停止失败"); }
}

// ============================================================
// Voice mode
// ============================================================
async function setVoice(mode) {
  $("voiceChatId").value = $("voiceChatId").value.trim() || "{{HOME_CHANNEL}}";
  try {
    await api("/api/voice", "POST", {chat_id: $("voiceChatId").value, mode: mode});
    toast("语音模式: " + (mode === "pure_voice" ? "纯语音" : "纯文字"));
    $("voiceModeLabel").textContent = mode === "pure_voice" ? "纯语音" : "纯文字";
  } catch(e) { toast("设置失败"); }
}

async function applyVoice() {
  var mode = document.querySelector(".btn-voice-on.active") ? "pure_voice" : "off";
  setVoice(mode);
}

// ============================================================
// Knowledge base
// ============================================================
async function searchObsidian() {
  var q = $("obsSearch").value.trim();
  if (!q) return toast("请输入搜索关键词");
  try {
    var r = await api("/api/obsidian/search", "POST", {query: q});
    var results = r.results || [];
    if (results.length === 0) { $("obsResults").innerHTML = '<div class="empty-state">无结果</div>'; return; }
    $("obsResults").innerHTML = results.map(function(x){
      return '<div class="search-result"><div class="title">'+esc(x.title)+'</div><div class="snippet">'+esc(x.snippet||"")+'</div></div>';
    }).join("");
  } catch(e) { toast("搜索失败"); }
}

async function loadObsidianStats() {
  try {
    var r = await api("/api/obsidian");
    if (r.available) {
      $("obsNotes").textContent = r.notes || 0;
      $("obsLinks").textContent = r.links || 0;
      $("obsTags").textContent = r.tags || 0;
    }
  } catch(e) {}
}

// ============================================================
// Memory
// ============================================================
async function searchMemory() {
  var q = $("memSearch").value.trim();
  if (!q) return toast("请输入搜索关键词");
  try {
    var r = await api("/api/memory/search", "POST", {query: q});
    var results = r.results || [];
    if (results.length === 0) { $("memResults").innerHTML = '<div class="empty-state">无结果</div>'; return; }
    $("memResults").innerHTML = results.map(function(x){
      return '<div class="search-result"><div class="title">'+esc(x.key)+'</div><div class="snippet">'+esc(x.value||"")+'</div></div>';
    }).join("");
  } catch(e) { toast("搜索失败"); }
}

async function runMaintenance() {
  try {
    await api("/api/memory", "POST");
    toast("维护完成");
  } catch(e) { toast("维护失败"); }
}

async function loadMemoryHealth() {
  try {
    var r = await api("/api/memory/health");
    var mem = r.memory || {};
    var tl = r.timeline || [];
    var h = '<div class="stat-row"><span class="key">总条目</span><span class="val">'+(mem.total||0)+'</span></div>';
    h += '<div class="stat-row"><span class="key">数据库大小</span><span class="val">'+(mem.size_mb||0)+' MB</span></div>';
    if (tl.length > 0) {
      h += '<div style="margin-top:12px;font-size:12px;color:var(--text2)">最近7天增长</div>';
      h += '<div style="display:flex;gap:4px;align-items:flex-end;height:60px;margin-top:8px">';
      var max = Math.max.apply(null,tl.map(function(d){return d.count}))||1;
      tl.forEach(function(d){
        var hh = Math.max(4, (d.count/max)*50);
        h += '<div title="'+d.date+': '+d.count+'" style="flex:1;background:var(--accent);height:'+hh+'px;border-radius:3px 3px 0 0;opacity:'+(0.3+d.count/max*0.7)+'"></div>';
      });
      h += '</div>';
    }
    $("memoryHealth").innerHTML = h;
  } catch(e) {}
}

// ============================================================
// Live2D
// ============================================================
var _l2dModels = {};

async function l2dLoadModels() {
  try {
    var r = await api("/api/live2d/models");
    _l2dModels = r.characters || {};
    var chars = Object.keys(_l2dModels);
    $("l2dChar").innerHTML = chars.length ? chars.map(function(c){return '<option value="'+c+'">'+c+'</option>'}).join("") : '<option>无角色</option>';
    l2dLoadOutfits();
  } catch(e) {}
}

function l2dLoadOutfits() {
  var c = $("l2dChar").value;
  var outfits = (_l2dModels[c] || {}).outfits || [];
  $("l2dOutfit").innerHTML = outfits.length ? outfits.map(function(o){return '<option value="'+o+'">'+o+'</option>'}).join("") : '<option>无服装</option>';
}

async function l2dSwitch() {
  var c = $("l2dChar").value, o = $("l2dOutfit").value;
  if (!c) return;
  try {
    await api("/api/live2d/switch", "POST", {character: c, outfit: o});
    $("l2dSwitchStatus").textContent = "已切换: " + c + " / " + o;
  } catch(e) { toast("切换失败"); }
}

// ============================================================
// Log stream
// ============================================================
var logSource = null, logLines = [];

function connectLogStream() {
  if (logSource) logSource.close();
  logLines = [];
  logSource = new EventSource(API + "/api/services/logs/stream");
  logSource.onmessage = function(e) {
    try {
      var d = JSON.parse(e.data);
      logLines.push(d);
      if (logLines.length > 500) logLines = logLines.slice(-500);
      requestAnimationFrame(function(){ renderLog(); });
    } catch(ex) {}
  };
  logSource.onerror = function() { logSource.close(); setTimeout(connectLogStream, 5000); };
}

function renderLog() {
  var area = $("logArea");
  var filtered = logLines.slice(-200);
  if (!filtered.length) { area.innerHTML = '<div class="log-empty">等待日志输出…</div>'; return; }
  var frag = document.createDocumentFragment();
  filtered.forEach(function(l) {
    var d = document.createElement("div"); d.className = "log-line";
    var ts = document.createElement("span"); ts.className = "ts"; ts.textContent = l.ts || ""; d.appendChild(ts);
    var tag = document.createElement("span"); tag.className = "svc-tag";
    tag.textContent = SERVICE_NAMES[l.service] || l.service;
    tag.style.background = (SERVICE_COLORS[l.service]||"#8e8e93") + "20";
    tag.style.color = SERVICE_COLORS[l.service] || "#8e8e93";
    d.appendChild(tag);
    d.appendChild(document.createTextNode(l.line || ""));
    frag.appendChild(d);
  });
  area.innerHTML = "";
  area.appendChild(frag);
  area.scrollTop = area.scrollHeight;
}

// ============================================================
// Init
// ============================================================
function init() {
  refreshServices();
  loadObsidianStats();
  loadMemoryHealth();
  connectLogStream();
  l2dLoadModels();
  setInterval(refreshServices, 10000);
  setInterval(loadMemoryHealth, 30000);
}
init();
</script>
